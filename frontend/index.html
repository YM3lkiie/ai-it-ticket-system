<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IT Ticket System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>AI IT TICKET DASHBOARD</h1>
    <!-- <button onclick="loadTickets()">Load Tickets</button> -->

    <h2>CREATE NEW TICKET</h2>
    <form id="ticketForm">
        <input type="text" id="title" placeholder="Ticket Title" required>
        <br><br>
        <textarea id="description" placeholder="Describe the issue" required></textarea>
        <br><br>
        <input type="text" id="created_by" placeholder="Your Name" required>
        <br><br>
        <button type="submit">Submit Ticket</button>
    </form>
    
    <table id = "ticketTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Priority</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="js/app.js"></script>
</body>
</html>
